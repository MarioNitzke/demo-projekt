services:
  postgres:
    image: postgres:15
    container_name: physiobook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: physiobook
      POSTGRES_USER: physiobook
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./PhysioBook
      dockerfile: Dockerfile
    container_name: physiobook-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=physiobook;Username=physiobook;Password=CHANGE_ME_DB_PASSWORD
      Jwt__Issuer: PhysioBook
      Jwt__Audience: PhysioBook.Client
      Jwt__Secret: physiobook-super-secret-key-for-demo-only-change-this
      Jwt__AccessTokenMinutes: 60
      Jwt__RefreshTokenDays: 7
    depends_on:
      - postgres
    ports:
      - "5050:5050"

  frontend:
    build:
      context: ./physiobook-frontend
      dockerfile: Dockerfile
    container_name: physiobook-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:

