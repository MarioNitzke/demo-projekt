version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: physiobook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: physiobook
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - physiobook-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d physiobook"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: physiobook-backend
    build:
      context: .
      dockerfile: PhysioBook.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=physiobook;Username=postgres;Password=CHANGE_ME_DB_PASSWORD;Include Error Detail=true
      JwtAuthSettings__Issuer: PhysioBook
      JwtAuthSettings__Audience: PhysioBook.Client
      JwtAuthSettings__Secret: ChangeThisSuperSecretDevelopmentJwtKey123456789
      JwtAuthSettings__AccessTokenExpirationMinutes: 60
      JwtAuthSettings__RefreshTokenExpirationDays: 7
    ports:
      - "5050:8080"

  frontend:
    container_name: physiobook-frontend
    build:
      context: .
      dockerfile: physiobook-frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  physiobook-postgres-data:
